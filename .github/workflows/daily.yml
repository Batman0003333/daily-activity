name: Daily Commit

on:
  schedule:
    # 12:00 AM IST every day
    - cron: '30 18 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update activity
        run: |
          echo "Last updated: $(date)" >> activity.txt

      - name: Commit and Push
        run: |
          git config user.name "Aman Verma"
          git config user.email "er.amanverma732003@gmail.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: daily activity"
          git push